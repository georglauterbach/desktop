# docker compose up --build
services:
  builder:
    container_name: builder-alacritty

    volumes:
      - ./src:/src

    #tty: true
    #stdin_open: true

    command: >
      /bin/bash -c "
      set -eE -u -o pipefail
      && export CARGO_HOME=/src/rust/cargo/home RUSTUP_HOME=/src/rust/rustup/home
      && rustup default 1.91.0
      && { [[ -d alacritty ]] || git clone https://github.com/alacritty/alacritty.git ; }
      && cd alacritty
      && git fetch -ptf
      && git checkout v0.16.1
      && cargo build --release --no-default-features --features=wayland
      "

    build:
      context: .
      dockerfile_inline: |
        FROM docker.io/rust:1.92.0-slim-trixie
        USER root
        WORKDIR /src

        RUN apt-get update && apt-get --yes install \
            cmake g++ git pkg-config \
            libfontconfig1-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev python3
