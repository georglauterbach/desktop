# docker compose up --build
services:
  builder:
    container_name: builder-sway

    volumes:
      - ./target:/target

    tty: true
    stdin_open: true


    command: >
      /bin/bash -c "
      set -eE -u -o pipefail
      && cd /target
      &&  { [[ -d wayland ]] || git clone https://gitlab.freedesktop.org/wayland/wayland.git ; }
      &&  (
            cd wayland
            git fetch -apt
            git checkout 1.24.0
            meson setup build --reconfigure --prefix=/usr/local -Ddocumentation=false
            ninja -C build install
          )
      { [[ -d pixman ]] || git clone https://gitlab.freedesktop.org/pixman/pixman.git ; }
      &&  (
            cd pixman
            git fetch -apt
            git checkout pixman-0.46.4
            meson setup build --reconfigure --prefix=/usr/local
            ninja -C build install
          )
      { [[ -d wayland-protocols ]] || git clone https://gitlab.freedesktop.org/wayland/wayland-protocols.git ; }
      &&  (
            cd wayland-protocols
            git fetch -apt
            git checkout 1.46
            meson setup build --reconfigure --prefix=/usr/local
            ninja -C build install
          )
      { [[ -d libinput ]] || git clone https://gitlab.freedesktop.org/libinput/libinput.git ; }
      &&  (
            cd libinput
            git fetch -apt
            git checkout 1.30.1
            meson setup build --reconfigure --prefix=/usr/local
            ninja -C build install
          )
      { [[ -d libxcb-errors ]] || git clone https://gitlab.freedesktop.org/xorg/lib/libxcb-errors.git ; }
      &&  (
            cd libxcb-errors
            git fetch -apt
            git pull
            git submodule update --init --recursive
            ./autogen.sh
            ./configure
            make install
          )
      { [[ -d wlroots ]] || git clone https://gitlab.freedesktop.org/wlroots/wlroots.git ; }
      &&  (
            cd wlroots
            git fetch -apt
            git checkout 0.19.2
            meson setup build --reconfigure --prefix=/usr/local
            ninja -C build install
          )
      { [[ -d sway ]] || git clone https://github.com/swaywm/sway.git ; }
      &&  (
            cd sway
            git fetch -apt
            git checkout 1.11
            meson setup build --reconfigure --prefix=/usr/local
            ninja -C build install
          )
      { [[ -d scenefx ]] || git clone https://github.com/wlrfx/scenefx.git ; }
      &&  (
            cd scenefx
            git fetch -apt
            git checkout 0.4.1
            meson setup build --reconfigure --prefix=/usr/local
            ninja -C build install
          )
      { [[ -d swayfx ]] || git clone https://github.com/WillPower3309/swayfx.git ; }
      &&  (
            cd swayfx
            git fetch -apt
            git checkout 0.5.3
            meson setup build --reconfigure --prefix=/usr/local
            ninja -C build install
          )
      echo 'SUCCESS'
      && rm -rf /target/usr_local
      && mkdir -p /target/usr_local
      && cp -r /usr/local/* /target/usr_local
      "

    build:
      context: .
      dockerfile: Dockerfile
